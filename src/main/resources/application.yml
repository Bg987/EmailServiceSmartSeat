server:
  port: 8082
spring:
  mail:
    host: smtp-relay.brevo.com
    port: 2525  # Try 2525 if 587 fails on Render
    username: your-brevo-email@example.com
    password: ${BREVO_SMTP_KEY} # Set this in Render Env Vars
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  kafka:
    bootstrap-servers: smartseat-bhavyagodhaniya2004-2234.k.aivencloud.com:26025

    properties:
      security.protocol: SSL

      schema.registry.url: ${KAFKA_URL}

      basic.auth.credentials.source: USER_INFO
      basic.auth.user.info: ${KAFKA_PASSWORD}

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    consumer:
      group-id: my-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer

      properties:
        spring.json.value.default.type: java.util.HashMap
        spring.json.trusted.packages: "*"

  datasource:
    url: jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres?sslmode=require
    username: postgres.axxwxwxnqteramwkrwrn
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  threads:
    virtual:
      enabled: true
  application:
    name: SmartSeatEmail
